name: Build Velvet ISO

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "kickstart/**"
      - "branding/**"
      - "scripts/**"
      - ".github/workflows/build-iso.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ISO_NAME: velvet-os-1.0-x86_64.iso
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (host)
        uses: jimhe/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          docker-images: true
          swap-storage-gb: 4

      - name: Show free space
        run: df -h /

      - name: Validate kickstart
        run: |
          docker pull quay.io/fedora/fedora:42
          docker run --rm -v "${{ github.workspace }}:/velvet:ro" quay.io/fedora/fedora:42 \
            bash -ec "dnf install -y pykickstart && ksvalidator /velvet/kickstart/velvet-fedora.ks"

      - name: Stage branding
        run: |
          sudo mkdir -p /run/velvet-branding
          sudo cp -a branding/. /run/velvet-branding/

      - name: Build ISO
        run: |
          set -euxo pipefail
          docker run --rm --privileged --cap-add SYS_ADMIN \
            -e ISO_NAME="${ISO_NAME}" \
            -v "${{ github.workspace }}:/velvet:rw" \
            -v /run/velvet-branding:/run/velvet-branding:ro \
            -w /velvet \
            quay.io/fedora/fedora:42 \
            bash -ecx '
              set -euxo pipefail
              dnf install -y lorax pykickstart dos2unix
              dos2unix kickstart/velvet-fedora.ks
              mkdir -p output/build output/anaconda-logs
              df -h
              if ! livemedia-creator \
                --make-iso \
                --no-virt \
                --ks=kickstart/velvet-fedora.ks \
                --resultdir=output/build \
                --project=Velvet \
                --releasever=42 \
                --iso-only \
                --iso-name=velvet-os-1.0-x86_64.iso \
                --volid=VELVET_OS \
                --logfile=output/lmc.log; then
                echo "===== lmc.log (tail) ====="
                tail -n 300 output/lmc.log 2>/dev/null || true
                echo "===== anaconda logs ====="
                find . -path "*/anaconda/*.log" -print -exec tail -n 80 {} \; 2>/dev/null || true
                echo "===== output/build tree ====="
                find output/build -maxdepth 4 -ls 2>/dev/null || true
                df -h
                exit 1
              fi
              ISO_PATH="$(find output/build -name "*.iso" | head -1)"
              if [ -z "${ISO_PATH}" ]; then
                echo "No ISO file found under output/build"
                find output/build -ls
                exit 1
              fi
              cp -f "${ISO_PATH}" "output/${ISO_NAME}"
              ls -lh "output/${ISO_NAME}"
            '

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: velvet-os-1.0-x86_64-iso
          path: output/velvet-os-1.0-x86_64.iso
          retention-days: 14
          if-no-files-found: error

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: |
            output/lmc.log
            output/build
          if-no-files-found: ignore
