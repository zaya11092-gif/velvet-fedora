name: Build Velvet ISO

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "kickstart/**"
      - "branding/**"
      - "scripts/**"
      - ".github/workflows/build-iso.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CI: true
      CONTAINER_ENGINE: docker
      VELVET_VERSION: "1.0"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h /

      - name: Prepare scripts (fix Windows line endings)
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix
          dos2unix scripts/build-iso.sh kickstart/velvet-fedora.ks
          chmod +x scripts/build-iso.sh
          head -1 scripts/build-iso.sh

      - name: Build ISO in Fedora 41 container
        run: ./scripts/build-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: velvet-os-1.0-x86_64-iso
          path: output/velvet-os-1.0-x86_64.iso
          retention-days: 14
          if-no-files-found: error

      - name: Summary
        run: |
          ls -lh output/
          echo "### Velvet OS ISO" >> $GITHUB_STEP_SUMMARY
          echo "Download the **velvet-os-1.0-x86_64-iso** artifact from this workflow run." >> $GITHUB_STEP_SUMMARY
