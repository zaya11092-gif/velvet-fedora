name: Build Velvet ISO

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "kickstart/**"
      - "branding/**"
      - "scripts/**"
      - ".github/workflows/build-iso.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ISO_NAME: velvet-os-1.0-x86_64.iso
    steps:
      - uses: actions/checkout@v4

      - name: Maximize disk space
        uses: jlumbago/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          docker-images: true

      - name: Show free space
        run: df -h /

      - name: Validate kickstart
        run: |
          docker pull quay.io/fedora/fedora:41
          docker run --rm -v "${{ github.workspace }}:/velvet:ro" quay.io/fedora/fedora:41 \
            bash -ec "dnf install -y pykickstart && ksvalidator /velvet/kickstart/velvet-fedora.ks && echo KS_OK"

      - name: Stage branding for installer
        run: |
          sudo mkdir -p /run/velvet-branding
          sudo cp -a branding/. /run/velvet-branding/

      - name: Build ISO (Fedora 41 + livemedia-creator)
        run: |
          docker run --rm --privileged \
            -e ISO_NAME="${ISO_NAME}" \
            -v "${{ github.workspace }}:/velvet:rw" \
            -v /run/velvet-branding:/run/velvet-branding:ro \
            -w /velvet \
            quay.io/fedora/fedora:41 \
            bash -ecx '
              set -euxo pipefail
              dnf install -y lorax pykickstart git curl wget dos2unix
              dos2unix kickstart/velvet-fedora.ks
              mkdir -p output/build
              df -h
              livemedia-creator \
                --make-iso \
                --no-virt \
                --ks=kickstart/velvet-fedora.ks \
                --resultdir=output/build \
                --project=Velvet \
                --releasever=41 \
                --iso-only \
                --iso-name="${ISO_NAME}" \
                --volid=VELVET_OS \
                --logfile=output/lmc.log || { tail -n 200 output/lmc.log || true; exit 1; }
              ISO_PATH="$(find output/build -name "*.iso" | head -1)"
              test -n "${ISO_PATH}"
              cp -f "${ISO_PATH}" "output/${ISO_NAME}"
              ls -lh "output/${ISO_NAME}"
              df -h
            '

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: velvet-os-1.0-x86_64-iso
          path: output/velvet-os-1.0-x86_64.iso
          retention-days: 14
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: |
            output/lmc.log
            output/build/**
          if-no-files-found: ignore

      - name: Summary
        if: success()
        run: |
          ls -lh output/
          echo "### Velvet OS ISO ready" >> $GITHUB_STEP_SUMMARY
          echo "Download artifact **velvet-os-1.0-x86_64-iso** from this run." >> $GITHUB_STEP_SUMMARY
